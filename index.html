    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: url('Copilot_20260411_233841.png') no-repeat center center fixed; 
            background-size: cover;
            color: #0f0000; 
            text-align: center; 
            padding: 20px; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container { 
            max-width: 500px; 
            background: rgba(243, 117, 195, 0.85); 
            padding: 40px; 
            border-radius: 30px; 
            border: 2px solid #ffb6c1; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); 
        }
        h1 { color: #faeaf2; margin-bottom: 5px; font-size: 2rem; }
        p { color: #1e93e0; margin-bottom: 25px; font-weight: 500; }
        
        #mensaje { 
            font-size: 1.4rem; 
            margin-top: 30px; 
            margin-bottom: 15px;
            min-height: 100px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic; 
            color: #333;
            line-height: 1.5;
            font-weight: 400;
        }

        /* --- Nueva Sección de Inglés --- */
        .english-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            display: none; /* Se muestra solo si la frase tiene inglés */
            animation: fadeIn 0.5s ease;
        }
        .en-phrase {
            font-size: 1.1rem;
            color: #4a0e2e;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        .vocab-tag {
            display: inline-block;
            background: #faeaf2;
            color: #fd0782;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: help;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ------------------------------- */

        button { 
            background: #fd0782; 
            color: #f7f7f7; 
            border: none; 
            padding: 18px 35px; 
            border-radius: 50px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: 0.4s; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.3);
        }
        button:hover { 
            background: #ff6f61; 
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 111, 97, 0.4);
        }
    </style>
</head>

        function nuevoMensaje() {
            const indice = Math.floor(Math.random() * mensajes.length);
            const objetoMensaje = mensajes[indice];
            
            // Colocar mensaje en español
            document.getElementById('mensaje').innerText = '"' + objetoMensaje.es + '"';
            
            const englishContainer = document.getElementById('englishContainer');
            
            // Verificar si esta frase tiene sección de inglés armada
            if (objetoMensaje.en && objetoMensaje.vocab) {
                document.getElementById('fraseIngles').innerText = '🇬🇧 "' + objetoMensaje.en + '"';
                document.getElementById('vocabulario').innerText = '💡 Vocabulario: ' + objetoMensaje.vocab;
